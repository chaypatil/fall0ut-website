<!doctype html>
<html lang="en">
  <head>

    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap"

    <link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body class="moments-page">
    <div class="wall-texture" aria-hidden="true"></div>

    <header class="site-header">
      <nav class="header-inner" aria-label="Primary navigation">
        <div class="nav-cluster">
          <a href="/events" class="nav-link">Events</a>
        </div>
        <a class="header-brand" href="/" aria-label="FALL0UT India">
          <span class="wordmark-crop compact">
            <img src="./assets/fall0ut-wordmark-cropped.webp" alt="" width="900" height="378" />
          </span>
          <span class="india-label">India</span>
        </a>
        <a href="/contact" class="nav-link nav-link--right">Contact</a>
      </nav>
    </header>

    <main id="top" class="moments-page-main">
      <section class="section moments-gallery-section moments-gallery-page" id="moments" aria-labelledby="moments-gallery-title">
        <div class="section-heading">
          <div>
            <h1 id="moments-gallery-title" class="page-title">FØ Moments</h1>
          </div>
        </div>
        <div class="moments-page-copy">
          <p>tag us · get reposted · show up.</p>
          <a
            class="moments-ig-link"
            href="https://www.instagram.com/fall0utindia"
            target="_blank"
            rel="noreferrer"
          >
            <span>@fall0utindia on IG</span>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M7 17 17 7" />
              <path d="M9 7h8v8" />
            </svg>
          </a>
        </div>
        <div class="moments-gallery-grid" aria-label="FØ moments gallery">
          <figure class="gallery-card">
            <img src="./assets/moments/moment-01.webp" alt="FØ Moments gallery 01" loading="lazy" decoding="async" />
          </figure>
          <figure class="gallery-card">
            <img src="./assets/moments/moment-02.webp" alt="FØ Moments gallery 02" loading="lazy" decoding="async" />
          </figure>
          <figure class="gallery-card">
            <img src="./assets/moments/moment-03.webp" alt="FØ Moments gallery 03" loading="lazy" decoding="async" />
          </figure>
          <figure class="gallery-card">
            <img src="./assets/moments/moment-04.webp" alt="FØ Moments gallery 04" loading="lazy" decoding="async" />
          </figure>
          <figure class="gallery-card gallery-card--wide">
            <img src="./assets/moments/moment-05.webp" alt="FØ Moments gallery 05" loading="lazy" decoding="async" />
          </figure>
          <figure class="gallery-card gallery-card--wide">
            <img src="./assets/moments/moment-06.webp" alt="FØ Moments gallery 06" loading="lazy" decoding="async" />
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <span>FALL0UT India</span>
    </footer>

    <script>
      function bindTouchActive(selector) {
        document.querySelectorAll(selector).forEach((card) => {
          const activate = () => card.classList.add("is-touch-active");
          const deactivate = () => {
            window.setTimeout(() => card.classList.remove("is-touch-active"), 220);
          };

          card.addEventListener("pointerdown", activate);
          card.addEventListener("pointerup", deactivate);
          card.addEventListener("pointerleave", deactivate);
          card.addEventListener("pointercancel", deactivate);
          card.addEventListener("touchstart", activate, { passive: true });
          card.addEventListener("touchend", deactivate, { passive: true });
          card.addEventListener("touchcancel", deactivate, { passive: true });
        });
      }

      bindTouchActive(".gallery-card");
    </script>
  </body>
</html>
